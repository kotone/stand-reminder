name: Build and Release

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发构建

jobs:
  build:
    permissions:
      contents: write # 允许创建 Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache (加速编译)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Ensure valid RGBA icons exist
        shell: pwsh
        run: |
          $iconsDir = "src-tauri/icons"
          if (!(Test-Path "$iconsDir")) { New-Item -ItemType Directory -Path "$iconsDir" -Force }
          
          # Generate a simple green circle RGBA icon if icon.png is missing
          if (!(Test-Path "$iconsDir/icon.png")) {
            Write-Host "Generating fallback RGBA icon..."
            Add-Type -AssemblyName System.Drawing
            $size = 256
            $bmp = New-Object System.Drawing.Bitmap($size, $size, [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::AntiAlias
            $g.Clear([System.Drawing.Color]::Transparent)
            $brush = New-Object System.Drawing.SolidBrush([System.Drawing.Color]::FromArgb(255, 52, 199, 89))
            $g.FillEllipse($brush, 16, 16, ($size-32), ($size-32))
            $g.Dispose()
            $bmp.Save("$iconsDir/icon.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Save("$iconsDir/32x32.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Save("$iconsDir/128x128.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $bmp.Save("$iconsDir/128x128@2x.png", [System.Drawing.Imaging.ImageFormat]::Png)
            # Save as ICO
            $ms = New-Object System.IO.MemoryStream
            $bmp.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $pngBytes = $ms.ToArray()
            $ms.Dispose()
            $ico = New-Object System.IO.FileStream("$iconsDir/icon.ico", [System.IO.FileMode]::Create)
            $bw = New-Object System.IO.BinaryWriter($ico)
            # ICO header
            $bw.Write([UInt16]0); $bw.Write([UInt16]1); $bw.Write([UInt16]1)
            # ICO directory entry (PNG stored)
            $bw.Write([byte]0); $bw.Write([byte]0)  # width/height 0 = 256
            $bw.Write([byte]0); $bw.Write([byte]0)  # colors / reserved
            $bw.Write([UInt16]1); $bw.Write([UInt16]32) # planes / bpp
            $bw.Write([UInt32]$pngBytes.Length)  # size of PNG data
            $bw.Write([UInt32]22)  # offset (6 header + 16 entry)
            $bw.Write($pngBytes)
            $bw.Close()
            $ico.Close()
            $bmp.Dispose()
            Write-Host "Fallback icons generated successfully."
          }
          
          # Ensure existing icon.png is RGBA
          Add-Type -AssemblyName System.Drawing
          $img = [System.Drawing.Image]::FromFile((Resolve-Path "$iconsDir/icon.png"))
          if ($img.PixelFormat -ne [System.Drawing.Imaging.PixelFormat]::Format32bppArgb) {
            Write-Host "Converting icon.png to RGBA..."
            $rgbaImg = New-Object System.Drawing.Bitmap($img.Width, $img.Height, [System.Drawing.Imaging.PixelFormat]::Format32bppArgb)
            $g = [System.Drawing.Graphics]::FromImage($rgbaImg)
            $g.DrawImage($img, 0, 0, $img.Width, $img.Height)
            $g.Dispose()
            $img.Dispose()
            $rgbaImg.Save((Resolve-Path "$iconsDir/icon.png").Path, [System.Drawing.Imaging.ImageFormat]::Png)
            $rgbaImg.Dispose()
            Write-Host "Conversion complete."
          } else {
            $img.Dispose()
            Write-Host "icon.png is already RGBA."
          }

      # 使用 Tauri CLI 构建，同时产出免安装 EXE 和 NSIS 安装包
      - name: Build with Tauri
        run: npx -y @tauri-apps/cli@1 build

      # 上传免安装的 EXE 文件
      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: StandReminder-Portable
          path: src-tauri/target/release/stand-reminder.exe

      # 上传 NSIS 安装包
      - name: Upload NSIS Installer
        uses: actions/upload-artifact@v4
        with:
          name: StandReminder-Setup
          path: src-tauri/target/release/bundle/nsis/*.exe

      # 如果推送了 tag，自动创建 Release 并附上两个文件
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            src-tauri/target/release/stand-reminder.exe
            src-tauri/target/release/bundle/nsis/*.exe
          body: |
            ## 下载说明
            - **StandReminder_x.x.x_x64-setup.exe** — 安装版（推荐，自动安装 WebView2 Runtime）
            - **stand-reminder.exe** — 免安装版（需系统已安装 WebView2 Runtime）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
