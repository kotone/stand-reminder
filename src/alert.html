<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站立健康提示</title>
    <link rel="stylesheet" href="alert.css">
</head>

<body>
    <!-- Flowing Aurora Border -->
    <div class="marquee-border" id="borderElem">
        <div class="aura-glow aura-glow-1"></div>
        <div class="aura-glow aura-glow-2"></div>
        <div class="aura-glow aura-glow-3"></div>
    </div>

    <!-- Theme Specific Effects Layer -->
    <div class="zen-shooting-star"></div>
    <div class="cyber-scanline"></div>
    <div class="forest-sunbeams">
        <div class="sunbeam sunbeam-1"></div>
        <div class="sunbeam sunbeam-2"></div>
        <div class="sunbeam sunbeam-3"></div>
    </div>

    <!-- Floating Particles in Background -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- Central Glassmorphism Alert Card -->
    <div class="center-alert" id="centerElem">
        <div class="glass-card">
            <!-- Top badge -->
            <div class="badge">健康提醒</div>
            
            <!-- Dynamic SVG Exercise Icon Area -->
            <div class="icon-section">
                <!-- Icon 1: Neck Release (颈部放松) -->
                <svg id="icon-neck" class="stretch-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="32" r="10" stroke="white" stroke-width="4" class="neck-head" />
                    <path d="M25 75 C 35 55, 65 55, 75 75" stroke="white" stroke-width="4" stroke-linecap="round" class="neck-body" />
                    <!-- Arrows indicating rotation/tilt -->
                    <path d="M30 25 Q 40 12 50 12 Q 60 12 70 25" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-dasharray="4 4" stroke-linecap="round" />
                    <path d="M27 21 L31 26 L25 26 Z" fill="rgba(255,255,255,0.8)" />
                    <path d="M73 21 L69 26 L75 26 Z" fill="rgba(255,255,255,0.8)" />
                </svg>

                <!-- Icon 2: Shoulder Roll (肩部舒展) -->
                <svg id="icon-shoulder" class="stretch-icon hidden" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="25" r="9" stroke="white" stroke-width="4" class="shoulder-head" />
                    <path d="M25 65 C 35 48, 65 48, 75 65" stroke="white" stroke-width="4" stroke-linecap="round" />
                    <!-- Arms forming shoulder circles -->
                    <path d="M 22 58 A 8 8 0 1 1 22 58.1" stroke="rgba(255,255,255,0.9)" stroke-width="3.5" stroke-linecap="round" class="shoulder-spin-left" />
                    <path d="M 78 58 A 8 8 0 1 1 78 58.1" stroke="rgba(255,255,255,0.9)" stroke-width="3.5" stroke-linecap="round" class="shoulder-spin-right" />
                </svg>

                <!-- Icon 3: Reach High (向上伸展) -->
                <svg id="icon-stretch" class="stretch-icon hidden" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="38" r="9" stroke="white" stroke-width="4" class="stretch-head" />
                    <path d="M35 80 C 42 62, 58 62, 65 80" stroke="white" stroke-width="4" stroke-linecap="round" />
                    <!-- Arms stretching up -->
                    <path d="M25 55 Q 35 45 42 22 Q 47 10 50 10 Q 53 10 58 22 Q 65 45 75 55" stroke="white" stroke-width="4" stroke-linecap="round" class="stretch-arms" />
                    <!-- Sparkles of energy -->
                    <path d="M50 3 L50 7" stroke="rgba(255,255,255,0.9)" stroke-width="2" stroke-linecap="round" class="sparkle-1" />
                    <path d="M42 5 L45 8" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" class="sparkle-2" />
                    <path d="M58 5 L55 8" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" class="sparkle-3" />
                </svg>

                <!-- Icon 4: Zen Breathe (星空冥想 - 呼吸环) -->
                <svg id="icon-zen-breathe" class="stretch-icon hidden" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Outer soft glowing ring -->
                    <circle cx="50" cy="50" r="38" stroke="rgba(192, 132, 252, 0.2)" stroke-width="2" />
                    <!-- Middle animated dashed guide ring -->
                    <circle cx="50" cy="50" r="30" stroke="rgba(192, 132, 252, 0.4)" stroke-width="1.5" stroke-dasharray="3 3" />
                    <!-- Inner breathing core ring -->
                    <circle cx="50" cy="50" r="20" fill="url(#zen-core-grad)" class="zen-breathe-core" />
                    <!-- Concentric ripples -->
                    <circle cx="50" cy="50" r="20" stroke="rgba(139, 92, 246, 0.6)" stroke-width="2" class="zen-ripple-1" />
                    <circle cx="50" cy="50" r="20" stroke="rgba(236, 72, 153, 0.4)" stroke-width="1.5" class="zen-ripple-2" />
                    <!-- Gradient definitions -->
                    <defs>
                        <radialGradient id="zen-core-grad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#EC4899" />
                            <stop offset="50%" stop-color="#8B5CF6" />
                            <stop offset="100%" stop-color="rgba(139, 92, 246, 0)" />
                        </radialGradient>
                    </defs>
                </svg>

                <!-- Icon 5: Cyber Stretch (赛博霓虹 - 关节激活) -->
                <svg id="icon-cyber-stretch" class="stretch-icon hidden" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background grid dots -->
                    <circle cx="20" cy="20" r="1" fill="rgba(6, 182, 212, 0.3)" />
                    <circle cx="80" cy="20" r="1" fill="rgba(6, 182, 212, 0.3)" />
                    <circle cx="20" cy="80" r="1" fill="rgba(6, 182, 212, 0.3)" />
                    <circle cx="80" cy="80" r="1" fill="rgba(6, 182, 212, 0.3)" />
                    <!-- Glowing connector lines -->
                    <path d="M 30 75 L 50 65 L 70 75" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1" />
                    <path d="M 50 25 L 50 65" stroke="rgba(236, 72, 153, 0.4)" stroke-width="1" />
                    <!-- Stylized Cyber Body -->
                    <circle cx="50" cy="22" r="8" stroke="#06B6D4" stroke-width="3" fill="#141419" class="cyber-head" />
                    <path d="M25 60 L 38 48 L 50 54 L 62 48 L 75 60" stroke="#EC4899" stroke-width="3.5" stroke-linecap="round" class="cyber-arms" />
                    <path d="M40 78 L 50 65 L 60 78" stroke="#06B6D4" stroke-width="3.5" stroke-linecap="round" />
                    <!-- Glowing joint nodes -->
                    <circle cx="38" cy="48" r="3" fill="#06B6D4" class="cyber-joint-l" />
                    <circle cx="62" cy="48" r="3" fill="#06B6D4" class="cyber-joint-r" />
                    <circle cx="50" cy="54" r="3.5" fill="#EC4899" />
                </svg>

                <!-- Icon 6: Forest Sprout (森林朝露 - 绿植抽芽) -->
                <svg id="icon-forest-sprout" class="stretch-icon hidden" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Soil/Ground curve -->
                    <path d="M 25 80 Q 50 74 75 80" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" />
                    <!-- Sprout stem -->
                    <path d="M 50 80 Q 52 50 42 30" stroke="#10B981" stroke-width="4.5" stroke-linecap="round" class="sprout-stem" />
                    <!-- Left leaf -->
                    <path d="M 45 48 C 30 45, 26 30, 44 38 Z" fill="#34D399" stroke="#10B981" stroke-width="1.5" class="sprout-leaf-l" />
                    <!-- Right leaf -->
                    <path d="M 49 38 C 65 35, 68 20, 50 28 Z" fill="#34D399" stroke="#10B981" stroke-width="1.5" class="sprout-leaf-r" />
                    <!-- Soft sun light circle behind sprout -->
                    <circle cx="50" cy="35" r="15" fill="rgba(251, 191, 36, 0.15)" filter="blur(4px)" class="sprout-sun" />
                </svg>
            </div>

            <!-- Health Guideline Text -->
            <div class="content-section">
                <h2 class="title" id="alertTitle">该站起来活动一下啦</h2>
                <div class="tips-container">
                    <p class="guide-subtitle" id="guideStep">加载中...</p>
                    <p class="guide-desc" id="guideText">跟着上方的动画舒缓身体吧</p>
                </div>
            </div>

            <!-- Visual feedback / progress ring at bottom of card -->
            <div class="glass-footer">
                <span class="footer-tip" id="footerText">关注健康，拒绝久坐</span>
            </div>
        </div>
    </div>
    
    <script src="alert.js"></script>
</body>

</html>
